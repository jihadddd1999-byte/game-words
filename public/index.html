<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>لعبة الكلمات السريعة - النسخة المصلحة</title>
  <link rel="stylesheet" href="style.css" />
  <!-- تأكد أن المسارات صحيحة -->
  <script src="/socket.io/socket.io.js" defer></script>
  <script src="game.js" defer></script>
</head>

<body>
  <main id="app-container">

    <header>
      <h1>🇮🇷🇮🇷🇮🇷</h1>
    </header>

    <section class="game-section">
      <div id="typingIndicator"></div>
      <div class="word-box" id="current-word">جاري التحميل...</div>

      <input
        type="text"
        id="input-answer"
        placeholder="اكتب الكلمة هنا"
        autocomplete="off"
        spellcheck="false"
      />

      <div id="answer-time" class="answer-time"></div>
      <div id="points-display" class="points-display">النقاط: 0</div>
    </section>

    <section class="controls">
      <button id="btn-chat" class="btn-main">💬 الشات</button>
      <button id="btn-change-name" class="btn-main">✍️ تغيير الاسم</button>
      <button id="btn-instructions" class="btn-main">📖 تعليمات اللعبة</button>
      <button id="dark-mode-toggle" class="btn-main">🌙 الوضع الليلي</button>
      <button id="btn-open-board" class="btn-main-nav">🎨 لوحة الرسم</button>
    </section>

    <section id="players-list-container" class="players-list-container">
      <h2>🏆 المتصدرون</h2>
      <ul id="players-list"></ul>
    </section>

    <!-- الشات -->
    <aside id="chat-container" class="chat-container" hidden>
      <header class="chat-header">
        <h3>الشات</h3>
        <button id="btn-close-chat">✖️</button>
      </header>
      <section id="chat-messages" class="chat-messages"></section>
      <form id="chat-form" class="chat-form">
        <input type="text" id="chat-input" placeholder="اكتب رسالة..." autocomplete="off" />
        <button type="submit">إرسال</button>
      </form>
    </aside>

    <!-- تغيير الاسم -->
    <dialog id="change-name-dialog">
      <form method="dialog" id="change-name-form">
        <h3>تغيير الاسم</h3>
        <input type="text" id="input-name" placeholder="اسمك الجديد" maxlength="20" required />
        <input type="color" id="input-color" value="#00e5ff" />
        <menu>
          <button type="button" id="btn-cancel-name">إلغاء</button>
          <button type="submit">تأكيد</button>
        </menu>
      </form>
    </dialog>

    <!-- التعليمات -->
    <dialog id="instructions-dialog">
      <h3>تعليمات اللعبة</h3>
      <div>
        <ol>
          <li>اكتب الكلمة بسرعة</li>
          <li>كل إجابة صحيحة = 10 نقاط</li>
          <li>تحدى أصدقائك في لوحة الرسم المباشرة</li>
        </ol>
      </div>
      <button id="close-instructions">إغلاق</button>
    </dialog>

    <!-- 🎨 لوحة الرسم -->
    <dialog id="board-dialog" class="studio-popup">
      <div class="studio-header">
        <div class="header-left">
          <h3>🎨 لوحة الرسم المباشرة</h3>
        </div>
        <div class="header-actions">
          <button id="btn-close-board">✖️</button>
        </div>
      </div>

      <div class="canvas-wrapper">
        <canvas id="main-canvas"></canvas>
      </div>

      <div class="studio-controls">
        <div class="control-group">
          <div class="item">
            <label>اللون</label>
            <input type="color" id="brush-color" value="#ffd700">
          </div>
          <div class="item">
            <label>الخلفية</label>
            <input type="color" id="bg-color" value="#1a140a">
          </div>
          <select id="brush-type">
            <option value="round">🖌️ ريشة</option>
            <option value="spray">💨 بخاخ</option>
            <option value="eraser">🧽 ممحاة</option>
          </select>
        </div>

        <div class="control-group">
          <div class="range-box">
            <span>الحجم</span>
            <input type="range" id="brush-size" min="1" max="60" value="5">
          </div>
          <div class="range-box">
            <span>الشفافية</span>
            <input type="range" id="brush-opacity" min="0.1" max="1" step="0.1" value="1">
          </div>
        </div>

        <div class="control-group buttons">
          <button id="btn-solo-mode">🔐 وضع منفرد: OFF</button>
          <button id="btn-clear-canvas">🗑️ مسح</button>
          <button id="btn-share-all">📢 مشاركة</button>
        </div>

        <hr class="divider">
        <div class="gallery-header">
          <h4>📸 المعرض (0/30)</h4>
          <button id="btn-save-to-gallery">📸 حفظ</button>
        </div>
        <div id="mini-gallery" class="gallery-grid"></div>
      </div>
    </dialog>

  </main>

  <!-- كود تشغيل الواجهة الأساسي -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // الوضع الليلي
      const darkModeBtn = document.getElementById('dark-mode-toggle');
      if(darkModeBtn) {
          darkModeBtn.onclick = () => {
              document.body.classList.toggle('dark-mode');
              darkModeBtn.innerText = document.body.classList.contains('dark-mode') ? "☀️ الوضع النهاري" : "🌙 الوضع الليلي";
          };
      }

      // فتح وإغلاق الشات
      const btnChat = document.getElementById('btn-chat');
      const chatContainer = document.getElementById('chat-container');
      const btnCloseChat = document.getElementById('btn-close-chat');
      if(btnChat) btnChat.onclick = () => chatContainer.hidden = !chatContainer.hidden;
      if(btnCloseChat) btnCloseChat.onclick = () => chatContainer.hidden = true;

      // فتح وإغلاق التعليمات
      const btnInstr = document.getElementById('btn-instructions');
      const diagInstr = document.getElementById('instructions-dialog');
      const btnCloseInstr = document.getElementById('close-instructions');
      if(btnInstr) btnInstr.onclick = () => diagInstr.showModal();
      if(btnCloseInstr) btnCloseInstr.onclick = () => diagInstr.close();

      // فتح وإغلاق تغيير الاسم
      const btnName = document.getElementById('btn-change-name');
      const diagName = document.getElementById('change-name-dialog');
      const btnCancelName = document.getElementById('btn-cancel-name');
      if(btnName) btnName.onclick = () => diagName.showModal();
      if(btnCancelName) btnCancelName.onclick = () => diagName.close();
    });
  </script>
</body>
</html>
